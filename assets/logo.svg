<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Neovim-like window frame -->
  <rect x="8" y="16" width="112" height="96" rx="8" fill="#1a1b26" stroke="#565f89" stroke-width="2"/>

  <!-- Top bar -->
  <rect x="8" y="16" width="112" height="20" rx="8" fill="#24283b"/>
  <rect x="8" y="28" width="112" height="8" fill="#24283b"/>
  <circle cx="22" cy="26" r="4" fill="#f7768e"/>
  <circle cx="36" cy="26" r="4" fill="#e0af68"/>
  <circle cx="50" cy="26" r="4" fill="#9ece6a"/>

  <!-- Document icon inside the buffer -->
  <rect x="44" y="48" width="40" height="52" rx="4" fill="#3b4261" stroke="#7aa2f7" stroke-width="2"/>
  <path d="M 68 48 L 68 64 L 84 64" fill="none" stroke="#7aa2f7" stroke-width="2"/>
  <path d="M 68 48 L 84 64" fill="none" stroke="#7aa2f7" stroke-width="1" opacity="0.5"/>

  <!-- Preview lines on document -->
  <rect x="52" y="72" width="24" height="3" rx="1.5" fill="#a9b1d6"/>
  <rect x="52" y="80" width="20" height="3" rx="1.5" fill="#a9b1d6"/>
  <rect x="52" y="88" width="24" height="3" rx="1.5" fill="#a9b1d6"/>

  <!-- Magnifying glass overlay (preview concept) -->
  <circle cx="76" cy="92" r="14" fill="none" stroke="#bb9af7" stroke-width="3"/>
  <line x1="86" y1="102" x2="98" y2="114" stroke="#bb9af7" stroke-width="3" stroke-linecap="round"/>

  <!-- Eye inside magnifying glass -->
  <ellipse cx="76" cy="92" rx="8" ry="5" fill="none" stroke="#bb9af7" stroke-width="1.5"/>
  <circle cx="76" cy="92" r="2.5" fill="#bb9af7"/>
</svg>
